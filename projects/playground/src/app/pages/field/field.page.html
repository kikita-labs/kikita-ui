<app-panel
  num="01"
  title="Field"
  description="Label, hint, error, required marker, and ARIA description wiring."
>
  <div class="field-grid">
    <kui-field label="Project name" hint="Default md size">
      <input kuiInput value="Kikita UI" />
    </kui-field>

    <kui-field label="Owner email" error="Email is required" required>
      <input kuiInput type="email" placeholder="nikita@kikita.dev" />
    </kui-field>

    <kui-field label="Notes" hint="Textarea keeps native behavior">
      <textarea kuiTextarea placeholder="Token decisions, component notes"></textarea>
    </kui-field>
  </div>
</app-panel>

<app-panel
  num="02"
  title="Affixes and messages"
  description="Shared field chrome for prefix, suffix, clear actions, icons, loading, and rich messages."
>
  <div class="field-grid field-grid--two">
    <kui-field label="Project URL" hint="Prefix and suffix are part of the field chrome.">
      <div class="kui-input-group">
        <span class="kui-field-affix">https://</span>
        <input kuiInput value="kikita" aria-label="Project slug" />
        <span class="kui-field-affix">.dev</span>
      </div>
    </kui-field>

    <kui-field label="Search" hint="Clear action uses the shared field action style.">
      <div class="kui-input-group">
        <span class="kui-field-affix-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8" />
            <path d="m21 21-4.3-4.3" />
          </svg>
        </span>
        <input kuiInput value="tokens" aria-label="Search query" />
        <button class="kui-field-action" type="button" aria-label="Clear search">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M18 6 6 18" />
            <path d="m6 6 12 12" />
          </svg>
        </button>
      </div>
    </kui-field>

    <kui-field>
      <label kuiLabel>API key</label>
      <div class="kui-input-group">
        <input kuiInput value="kui_live_" aria-label="API key" />
        <span class="kui-field-spinner" role="status" aria-label="Checking key"></span>
      </div>
      <p kuiHint class="kui-field-message">
        <span class="kui-field-message-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10" />
            <path d="M12 16v-4" />
            <path d="M12 8h.01" />
          </svg>
        </span>
        <span>Stored encrypted. <a href="/field">Learn where to find it</a>.</span>
      </p>
    </kui-field>

    <kui-field required>
      <label kuiLabel>Domain</label>
      <div class="kui-input-group" data-kui-invalid>
        <span class="kui-field-affix">https://</span>
        <input kuiInput value="example" aria-label="Domain" />
      </div>
      <p kuiError class="kui-field-message">
        <span class="kui-field-message-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10" />
            <path d="M12 8v4" />
            <path d="M12 16h.01" />
          </svg>
        </span>
        <span>Domain must include a valid suffix.</span>
      </p>
    </kui-field>
  </div>
</app-panel>

<app-panel
  num="03"
  title="Size matrix"
  description="xs / sm / md / lg x default / error / disabled."
>
  <div class="table-wrap">
    <table kuiTable aria-label="Field size matrix">
      <thead>
        <tr kuiThGroup>
          <th kuiTh></th>
          <th kuiTh>Default</th>
          <th kuiTh>Error</th>
          <th kuiTh>Disabled</th>
        </tr>
      </thead>
      <tbody>
        @for (sizeRow of sizeRows; track sizeRow.value) {
          <tr>
            <td kuiCell class="matrix-label">
              <strong>{{ sizeRow.label }}</strong>
              <code>size="{{ sizeRow.value }}"</code>
            </td>
            <td kuiCell style="padding: 12px; vertical-align: top">
              <kui-field
                [size]="sizeRow.value"
                label="Label"
                hint="Hint text"
                style="inline-size: 100%"
              >
                <input kuiInput [size]="sizeRow.value" placeholder="Value" />
              </kui-field>
            </td>
            <td kuiCell style="padding: 12px; vertical-align: top">
              <kui-field
                [size]="sizeRow.value"
                label="Label"
                [error]="'Required'"
                style="inline-size: 100%"
              >
                <input kuiInput [size]="sizeRow.value" placeholder="Value" />
              </kui-field>
            </td>
            <td kuiCell style="padding: 12px; vertical-align: top">
              <kui-field
                [size]="sizeRow.value"
                label="Label"
                hint="Hint text"
                style="inline-size: 100%"
              >
                <input kuiInput [size]="sizeRow.value" placeholder="Value" disabled />
              </kui-field>
            </td>
          </tr>
        }
      </tbody>
    </table>
  </div>
</app-panel>
