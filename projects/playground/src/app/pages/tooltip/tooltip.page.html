<app-panel
  num="01"
  title="Tooltip"
  description="Text tooltip on hover and keyboard focus. Not shown on touch."
>
  <div class="component-board">
    <div class="state-board__row">
      <button kuiButton type="button" [kuiTooltip]="'Save changes'">Top (default)</button>
      <button kuiButton shape="soft" type="button" [kuiTooltip]="'View details'" placement="bottom">
        Bottom
      </button>
      <button kuiButton shape="outline" type="button" [kuiTooltip]="'Go back'" placement="left">
        Left
      </button>
      <button kuiButton shape="ghost" type="button" [kuiTooltip]="'Next step'" placement="right">
        Right
      </button>
    </div>

    <div class="state-board__row">
      <button kuiIconButton aria-label="Confirm" type="button" [kuiTooltip]="'Confirm action'">
        <kui-icon name="check" />
      </button>
      <button
        kuiIconButton
        shape="soft"
        aria-label="Spark"
        type="button"
        [kuiTooltip]="'Generate with AI'"
        placement="bottom"
      >
        <kui-icon name="sparkle" />
      </button>
      <button
        kuiIconButton
        appearance="danger"
        aria-label="Warning"
        type="button"
        [kuiTooltip]="'Destructive action'"
        placement="right"
      >
        <kui-icon name="triangle-alert" />
      </button>
    </div>

    <div class="state-board__row">
      <button kuiButton shape="ghost" type="button" [kuiTooltip]="''">No tooltip (empty)</button>
      <button
        kuiButton
        shape="outline"
        type="button"
        [kuiTooltip]="'Longer tooltip text that wraps across multiple lines when the content exceeds the max width of 280px'"
        placement="bottom"
      >
        Long text
      </button>
    </div>
  </div>
</app-panel>
