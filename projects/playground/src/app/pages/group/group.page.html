<app-panel
  num="01"
  title="Group primitive"
  description="Horizontal and vertical grouped native controls."
>
  <div class="component-board">
    <div kuiGroup collapsed>
      <button kuiButton shape="outline" type="button">Left</button>
      <button kuiButton shape="outline" type="button">Center</button>
      <button kuiButton shape="outline" type="button">Right</button>
    </div>

    <div kuiGroup collapsed size="sm">
      <button kuiButton shape="outline" type="button">One</button>
      <button kuiButton shape="outline" type="button">Two</button>
      <button kuiIconButton shape="outline" aria-label="More" type="button">
        <kui-icon name="spark" />
      </button>
    </div>

    <div kuiGroup collapsed orientation="vertical" class="group-demo-vertical">
      <button kuiButton shape="outline" type="button">Top</button>
      <button kuiButton shape="outline" type="button">Middle</button>
      <button kuiButton shape="outline" type="button">Bottom</button>
    </div>

    <div kuiGroup collapsed>
      <input kuiInput placeholder="Search" />
      <button kuiIconButton shape="outline" aria-label="Search" type="button">
        <kui-icon name="spark" />
      </button>
    </div>

    <div kuiGroup collapsed size="sm">
      <input kuiInput placeholder="Search" />
      <button kuiButton shape="outline" type="button">Go</button>
    </div>

    <div kuiGroup collapsed size="lg">
      <input kuiInput placeholder="Search" />
      <button kuiIconButton shape="outline" aria-label="Search" type="button">
        <kui-icon name="spark" />
      </button>
    </div>
  </div>
</app-panel>
