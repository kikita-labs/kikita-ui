<app-panel
  num="01"
  title="input[kuiSelect] — строки"
  description="Базовый паттерн: <code>input[kuiSelect]</code> с кастомным <code>kui-dropdown</code> внутри field. Строки — без <code>kuiLabelFn</code>."
>
  <div class="state-board__row">
    <kui-field label="Role" style="width: 240px">
      <input kuiSelect [(value)]="selectedRole" placeholder="Select a role…" />
      <kui-dropdown>
        @for (opt of roles; track opt.value) {
          <div kuiOption [value]="opt.value">{{ opt.label }}</div>
        }
      </kui-dropdown>
    </kui-field>
    <code>value: {{ selectedRole() ?? 'null' }}</code>
  </div>
</app-panel>

<app-panel
  num="02"
  title="input[kuiSelect] — объекты + clearable"
  description="<code>kuiLabelFn</code> для кастомных объектов. <code>[clearable]=&quot;true&quot;</code> добавляет кнопку сброса. Неактивные пользователи задизейблены."
>
  <div class="state-board__row">
    <kui-field label="User" style="width: 280px">
      <input
        kuiSelect
        [(value)]="selectedUser"
        [kuiLabelFn]="userLabelFn"
        [clearable]="true"
        placeholder="Select a user…"
      />
      <kui-dropdown>
        @for (user of users; track user.id) {
          <div kuiOption [value]="user" [disabled]="!user.active">
            {{ user.name }}
            @if (!user.active) {
              <span style="margin-left: auto; opacity: 0.45; font-size: 11px">inactive</span>
            }
          </div>
        }
      </kui-dropdown>
    </kui-field>
    <code>value: {{ selectedUser()?.name ?? 'null' }}</code>
  </div>
</app-panel>

<app-panel
  num="03"
  title="input[kuiSelect] — disabled"
  description="Disabled состояние: поле задизейблено, дропдаун не открывается даже по клику на label."
>
  <div class="state-board__row">
    <kui-field label="Locked field" style="width: 240px">
      <input
        kuiSelect
        [value]="selectedRole()"
        [disabled]="true"
        placeholder="Disabled…"
      />
      <kui-dropdown>
        @for (opt of roles; track opt.value) {
          <div kuiOption [value]="opt.value">{{ opt.label }}</div>
        }
      </kui-dropdown>
    </kui-field>
  </div>
</app-panel>
