<app-panel
  num="01"
  title="Single mode"
  description='Default <code>mode="single"</code>. Click a day to select it; today has a ring, the selection a filled circle.'
>
  <div class="component-board">
    <kui-calendar [(value)]="singleValue" />
    <div class="value-label">
      {{ singleDate() ? (singleDate() | date: 'yyyy-MM-dd') : '—' }}
    </div>
  </div>
</app-panel>

<app-panel
  num="02"
  title="Range mode"
  description='<code>mode="range"</code>. First click sets the start; hovering before the second click previews the range; second click commits it.'
>
  <div class="component-board">
    <kui-calendar mode="range" [(value)]="rangeValue" />
    <div class="value-label">
      @if (range(); as r) {
        {{ r.start | date: 'yyyy-MM-dd' }}
        –
        {{ r.end ? (r.end | date: 'yyyy-MM-dd') : '…' }}
      } @else {
        —
      }
    </div>
  </div>
</app-panel>

<app-panel
  num="03"
  title="Disabled dates"
  description="<code>minDate</code> disables everything before today. Toggle to compare."
>
  <div class="component-board">
    <button type="button" kuiButton appearance="outline" size="sm" (click)="toggleRestrict()">
      Future only: {{ restrictPast() ? 'on' : 'off' }}
    </button>
    <kui-calendar [(value)]="restrictedValue" [minDate]="minDate()" />
  </div>
</app-panel>

<app-panel
  num="04"
  title="Sizes"
  description="<code>size</code>: md (default) / sm — sm drops the border/padding for embedding in sidebars."
>
  <div class="component-board" style="flex-direction: row; align-items: flex-start; gap: 24px">
    <kui-calendar [(value)]="sidebarValue" />
    <kui-calendar size="sm" [(value)]="sidebarValue" />
  </div>
</app-panel>

<app-panel
  num="05"
  title="Locale"
  description="<code>locale</code> input overrides the app-wide <code>KUI_LOCALE</code> default — month/weekday names and first day of week come from <code>Intl</code>, no bundled locale data."
>
  <div class="component-board" style="flex-direction: row; align-items: flex-start; gap: 24px">
    <kui-calendar locale="en-US" [(value)]="ruValue" />
    <kui-calendar locale="ru-RU" [(value)]="ruValue" />
  </div>
</app-panel>

<app-panel
  num="06"
  title="Footer"
  description='Off by default. <code>showFooter</code> adds the value + "Today" shortcut — useful when the calendar is the whole surface, e.g. inside a popover.'
>
  <div class="component-board">
    <kui-calendar showFooter [(value)]="footerValue" />
  </div>
</app-panel>

<app-panel
  num="07"
  title="Custom footer (content projection)"
  description="Project an element with <code>kuiCalendarFooter</code> to fully replace the built-in footer."
>
  <div class="component-board">
    <kui-calendar [(value)]="footerValue">
      <div kuiCalendarFooter class="custom-footer">
        <button
          type="button"
          kuiButton
          appearance="ghost"
          size="xs"
          (click)="footerValue.set(null)"
        >
          Clear
        </button>
      </div>
    </kui-calendar>
  </div>
</app-panel>
