<main class="shell">
  <header kuiCard class="header">
    <div>
      <p>Kikita UI &middot; Playground</p>
      <h1>Development board</h1>
    </div>

    <kui-segmented [selected]="mode()" (selectedChange)="setMode($any($event))" size="sm">
      <button kuiSegment value="light">light</button>
      <button kuiSegment value="dark">dark</button>
    </kui-segmented>
  </header>

  <nav kuiCard class="playground-nav" aria-label="Playground sections">
    @for (item of navItems; track item.path) {
      <a
        kuiButton
        size="sm"
        [appearance]="currentPath() === item.path ? 'soft' : 'ghost'"
        [routerLink]="item.path"
        [attr.aria-current]="currentPath() === item.path ? 'page' : null"
      >
        {{ item.label }}
      </a>
    }
  </nav>

  <router-outlet />
</main>
