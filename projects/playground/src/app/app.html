<main class="shell">
  <header kuiCard class="header">
    <div>
      <p>Kikita UI &middot; Playground</p>
      <h1>Development board</h1>
    </div>

    <kui-segmented [selected]="mode()" (selectedChange)="setMode($any($event))" size="sm">
      <button kuiSegment value="light">light</button>
      <button kuiSegment value="dark">dark</button>
    </kui-segmented>
  </header>

  <kui-tabs
    class="playground-nav"
    [selected]="currentPath()"
    (selectedChange)="navigate($event)"
    size="sm"
    [controlsPanels]="false"
    aria-label="Playground sections"
  >
    @for (item of navItems; track item.path) {
      <button kuiTab [value]="item.path">{{ item.label }}</button>
    }
  </kui-tabs>

  <router-outlet />
</main>
